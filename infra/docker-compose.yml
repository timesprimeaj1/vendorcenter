version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: vendorcenter-backend
    env_file:
      - ../.env.example
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: vendorcenter-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: vendorcenter-postgres
    environment:
      POSTGRES_DB: vendorcenter
      POSTGRES_USER: vendorcenter
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vendorcenter-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: vendorcenter-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pg_data:
  minio_data:
